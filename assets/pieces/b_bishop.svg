<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Ornate Black Marble and Gold Bishop Chess Piece</title>
  <desc id="desc">A scalable 2D vector SVG of a black marble bishop chess piece with gold trim, ornate carvings, subtle veining, and transparent background.</desc>

  <defs>
    <linearGradient id="blackMarble" x1="210" y1="110" x2="820" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050506"/>
      <stop offset="0.18" stop-color="#18191c"/>
      <stop offset="0.38" stop-color="#070708"/>
      <stop offset="0.62" stop-color="#232429"/>
      <stop offset="0.82" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#1a1b20"/>
    </linearGradient>

    <radialGradient id="marbleGlow" cx="43%" cy="26%" r="68%">
      <stop offset="0" stop-color="#777a82" stop-opacity="0.35"/>
      <stop offset="0.28" stop-color="#34363c" stop-opacity="0.28"/>
      <stop offset="0.72" stop-color="#08080a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gold" x1="170" y1="120" x2="865" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6f4308"/>
      <stop offset="0.16" stop-color="#f2c766"/>
      <stop offset="0.34" stop-color="#fff2a9"/>
      <stop offset="0.52" stop-color="#b77b16"/>
      <stop offset="0.7" stop-color="#f5d370"/>
      <stop offset="1" stop-color="#7a4a08"/>
    </linearGradient>

    <linearGradient id="goldDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3e2404"/>
      <stop offset="0.42" stop-color="#b87912"/>
      <stop offset="0.65" stop-color="#ffe690"/>
      <stop offset="1" stop-color="#6a3e06"/>
    </linearGradient>

    <linearGradient id="edgeHighlight" x1="280" y1="130" x2="700" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.28" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <clipPath id="bishopClip">
      <path d="M512 102
               C456 139 423 190 421 248
               C358 288 319 359 329 433
               C337 491 375 538 423 568
               C385 602 361 648 361 701
               L663 701
               C663 649 639 603 601 568
               C656 535 696 482 698 418
               C700 330 648 269 603 245
               C601 184 566 138 512 102Z"/>
    </clipPath>

    <pattern id="fineVeins" width="220" height="220" patternUnits="userSpaceOnUse">
      <path d="M-20 70 C48 42 82 108 144 81 C184 64 199 42 242 55" fill="none" stroke="#bfc3cd" stroke-width="2" stroke-opacity="0.13"/>
      <path d="M15 188 C74 148 112 181 154 151 C180 132 196 117 225 122" fill="none" stroke="#ffffff" stroke-width="1.25" stroke-opacity="0.10"/>
      <path d="M67 -18 C76 45 42 72 58 132 C66 162 89 187 74 232" fill="none" stroke="#8b8f99" stroke-width="1.6" stroke-opacity="0.12"/>
      <path d="M132 7 C166 45 142 92 188 130" fill="none" stroke="#d8dbe4" stroke-width="0.9" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <g filter="url(#softShadow)">
    <!-- rear gold halo rim -->
    <path d="M512 84
             C447 126 407 183 402 238
             C335 283 294 363 306 441
             C315 503 352 552 397 584
             C362 615 337 659 331 713
             C327 750 354 779 392 779
             L632 779
             C670 779 697 750 693 713
             C687 659 662 615 627 584
             C679 548 718 490 721 421
             C725 328 673 260 623 229
             C615 168 576 125 512 84Z"
          fill="url(#gold)" opacity="0.98"/>

    <!-- bishop body -->
    <path d="M512 102
             C456 139 423 190 421 248
             C358 288 319 359 329 433
             C337 491 375 538 423 568
             C385 602 361 648 361 701
             L663 701
             C663 649 639 603 601 568
             C656 535 696 482 698 418
             C700 330 648 269 603 245
             C601 184 566 138 512 102Z"
          fill="url(#blackMarble)" stroke="url(#gold)" stroke-width="11" stroke-linejoin="round"/>

    <path d="M512 102
             C456 139 423 190 421 248
             C358 288 319 359 329 433
             C337 491 375 538 423 568
             C385 602 361 648 361 701
             L663 701
             C663 649 639 603 601 568
             C656 535 696 482 698 418
             C700 330 648 269 603 245
             C601 184 566 138 512 102Z"
          fill="url(#marbleGlow)" opacity="0.9"/>

    <g clip-path="url(#bishopClip)">
      <rect x="300" y="80" width="430" height="650" fill="url(#fineVeins)" opacity="0.95"/>
      <path d="M425 168 C381 266 386 420 473 523 C509 566 534 604 540 701"
            fill="none" stroke="#ffffff" stroke-width="5" stroke-opacity="0.10" stroke-linecap="round"/>
      <path d="M591 151 C641 257 625 355 579 442 C545 506 522 570 523 705"
            fill="none" stroke="#737783" stroke-width="4" stroke-opacity="0.24" stroke-linecap="round"/>
      <path d="M351 382 C430 336 468 358 529 324 C598 286 615 226 677 220"
            fill="none" stroke="#c9ccd5" stroke-width="3" stroke-opacity="0.12" stroke-linecap="round"/>
      <path d="M367 623 C438 587 502 606 572 579 C619 561 642 534 681 535"
            fill="none" stroke="#ffffff" stroke-width="2.2" stroke-opacity="0.11" stroke-linecap="round"/>
    </g>

    <!-- bishop diagonal mitre slash -->
    <path d="M556 215
             C532 265 511 314 493 366
             C483 395 470 424 456 455
             C453 462 460 469 467 466
             C515 445 554 407 578 359
             C600 314 611 268 614 226
             C615 216 561 205 556 215Z"
          fill="#050506" stroke="url(#gold)" stroke-width="7" stroke-linejoin="round"/>
    <path d="M568 231 C548 282 522 359 480 442" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.18" stroke-linecap="round"/>

    <!-- top gold cap and gem -->
    <ellipse cx="512" cy="114" rx="41" ry="24" fill="url(#gold)" stroke="#fff0a3" stroke-width="3"/>
    <ellipse cx="512" cy="112" rx="19" ry="10" fill="#1d1e24" stroke="url(#goldDark)" stroke-width="3"/>

    <!-- collar bands -->
    <path d="M402 559 C464 594 559 597 621 558" fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>
    <path d="M419 571 C470 594 556 597 606 571" fill="none" stroke="#fff5b8" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round"/>

    <path d="M368 689 C422 721 602 721 656 689 L672 736 C603 772 421 772 352 736Z"
          fill="url(#gold)" stroke="#fff1a6" stroke-width="3" stroke-linejoin="round"/>
    <path d="M379 703 C443 726 581 726 645 703" fill="none" stroke="#422608" stroke-width="5" stroke-opacity="0.42" stroke-linecap="round"/>
    <path d="M397 727 C456 744 568 744 627 727" fill="none" stroke="#fff4b3" stroke-width="3" stroke-opacity="0.68" stroke-linecap="round"/>

    <!-- stem and pedestal -->
    <path d="M420 728
             C442 701 582 701 604 728
             C626 756 637 798 622 835
             L402 835
             C387 798 398 756 420 728Z"
          fill="url(#blackMarble)" stroke="url(#gold)" stroke-width="10" stroke-linejoin="round"/>
    <path d="M415 748 C465 775 561 775 609 748" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.12"/>
    <path d="M448 733 C423 771 417 805 428 835" fill="none" stroke="#ffffff" stroke-width="5" stroke-opacity="0.10" stroke-linecap="round"/>

    <ellipse cx="512" cy="839" rx="204" ry="43" fill="url(#gold)" stroke="#fff1a4" stroke-width="3"/>
    <ellipse cx="512" cy="835" rx="166" ry="25" fill="#18191e" stroke="url(#goldDark)" stroke-width="6"/>

    <path d="M304 847
             C354 822 670 822 720 847
             L765 906
             C705 944 319 944 259 906Z"
          fill="url(#blackMarble)" stroke="url(#gold)" stroke-width="12" stroke-linejoin="round"/>
    <path d="M285 902 C353 935 671 935 739 902" fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>
    <path d="M323 873 C417 850 607 850 701 873" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.12" stroke-linecap="round"/>

    <!-- ornamental gold carvings -->
    <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round">
      <path d="M424 646 C448 621 476 621 499 646 C522 671 548 671 573 646 C590 629 611 624 632 637" stroke-width="5" opacity="0.85"/>
      <path d="M405 391 C426 357 463 349 490 374" stroke-width="5" opacity="0.7"/>
      <path d="M623 397 C599 366 570 359 545 382" stroke-width="5" opacity="0.7"/>
      <path d="M454 273 C481 246 540 246 568 273" stroke-width="4" opacity="0.75"/>
      <path d="M458 518 C493 539 532 539 566 518" stroke-width="4" opacity="0.72"/>
    </g>

    <!-- small jewels / trim beads -->
    <g fill="url(#goldDark)" stroke="#fff1a5" stroke-width="2">
      <circle cx="396" cy="696" r="7"/>
      <circle cx="449" cy="714" r="6"/>
      <circle cx="512" cy="720" r="7"/>
      <circle cx="575" cy="714" r="6"/>
      <circle cx="628" cy="696" r="7"/>
      <circle cx="363" cy="899" r="8"/>
      <circle cx="436" cy="913" r="7"/>
      <circle cx="512" cy="918" r="8"/>
      <circle cx="588" cy="913" r="7"/>
      <circle cx="661" cy="899" r="8"/>
    </g>

    <!-- highlights -->
    <path d="M456 139 C411 199 401 267 421 313" fill="none" stroke="url(#edgeHighlight)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
    <path d="M364 405 C372 478 425 535 482 551" fill="none" stroke="#ffffff" stroke-width="5" stroke-opacity="0.11" stroke-linecap="round"/>
    <path d="M327 882 C393 858 633 858 698 882" fill="none" stroke="#ffffff" stroke-width="5" stroke-opacity="0.11" stroke-linecap="round"/>
  </g>
</svg>
