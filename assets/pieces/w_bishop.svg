    <path d="M264 133 C273 144 274 160 267 177 C260 192 249 204 237 214" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="4" stroke-linecap="round"/>

    <!-- Gold halo bands on head -->
    <path d="M201 172 C222 185 290 185 311 172" fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
    <path d="M206 209 C228 223 284 223 306 209" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" opacity="0.86"/>
    <path d="M200 285 C228 300 284 300 312 285" fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round"/>

    <!-- Ornamental engravings -->
    <g clip-path="url(#bishopClip)" fill="none" stroke="#7e7e79" stroke-opacity="0.42" stroke-width="2.2" stroke-linecap="round">
      <path d="M211 118 C236 103 276 103 301 118"/>
      <path d="M219 134 C238 124 274 124 293 134"/>
      <path d="M216 316 C238 302 274 302 296 316"/>
      <path d="M229 335 C244 326 268 326 283 335"/>
      <path d="M235 275 C247 266 265 266 277 275"/>
      <path d="M225 306 C231 293 241 288 256 287 C271 288 281 293 287 306"/>
    </g>

    <!-- Marble veining -->
    <g clip-path="url(#bishopClip)" fill="none" stroke-linecap="round">
      <path d="M213 96 C235 119 222 143 246 158 C265 170 250 195 268 212 C287 229 283 253 302 269" stroke="#777772" stroke-opacity="0.32" stroke-width="2.3"/>
      <path d="M291 76 C269 101 281 120 259 141 C245 155 244 176 226 190" stroke="#a8a8a1" stroke-opacity="0.35" stroke-width="1.7"/>
      <path d="M205 248 C229 259 236 279 220 302 C210 317 219 334 235 350" stroke="#8b8b85" stroke-opacity="0.28" stroke-width="2"/>
      <path d="M300 284 C281 296 286 319 267 333 C251 345 255 354 244 365" stroke="#686862" stroke-opacity="0.25" stroke-width="1.8"/>
      <path d="M238 62 C253 79 249 95 269 110" stroke="#b5b5ae" stroke-opacity="0.4" stroke-width="1.5"/>
    </g>

    <!-- Gold carved central emblem -->
    <path d="M256 258 C240 275 238 294 256 312 C274 294 272 275 256 258 Z" fill="none" stroke="url(#gold)" stroke-width="4"/>
    <circle cx="256" cy="288" r="6" fill="url(#gold)"/>
    <path d="M229 328 C241 340 271 340 283 328" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>

    <!-- Highlights -->
    <path d="M228 79 C208 111 202 143 207 175 C211 201 220 220 232 238" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
    <path d="M215 377 C242 384 286 384 314 377" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.34"/>
    <path d="M143 447 C180 456 331 456 370 447" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.34"/>

    <!-- Tiny gold jewels/trim dots -->
    <g fill="url(#gold)" stroke="#8d5f0e" stroke-width="1">
      <circle cx="221" cy="285" r="4"/>
      <circle cx="291" cy="285" r="4"/>
      <circle cx="219" cy="209" r="3"/>
      <circle cx="293" cy="209" r="3"/>
      <circle cx="206" cy="352" r="4"/>
      <circle cx="306" cy="352" r="4"/>
    </g>
  </g>
</svg>
