<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">Ornate White Marble Gold Bishop Chess Piece</title>
  <desc id="desc">A luxury 2D vector SVG bishop chess piece carved from white marble with subtle gray veining, gold trim, engraved ornaments, and transparent background.</desc>
  <defs>
    <linearGradient id="whiteMarble" x1="110" y1="40" x2="405" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.18" stop-color="#f8f8f4"/>
      <stop offset="0.42" stop-color="#deded8"/>
      <stop offset="0.65" stop-color="#f5f4ef"/>
      <stop offset="1" stop-color="#c8c8c1"/>
    </linearGradient>
    <linearGradient id="marbleShadow" x1="170" y1="70" x2="350" y2="485" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#d8d8d2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9f9f99" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gold" x1="115" y1="60" x2="390" y2="465" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff1a8"/>
      <stop offset="0.22" stop-color="#d8a931"/>
      <stop offset="0.48" stop-color="#fff7c8"/>
      <stop offset="0.72" stop-color="#b37a16"/>
      <stop offset="1" stop-color="#f2cd67"/>
    </linearGradient>
    <linearGradient id="darkGold" x1="160" y1="90" x2="350" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#92620e"/>
      <stop offset="0.5" stop-color="#f6d979"/>
      <stop offset="1" stop-color="#8b5d0c"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <clipPath id="bishopClip">
      <path d="M256 44 C214 75 190 118 190 168 C190 202 203 230 219 253 C194 278 177 318 177 360 L335 360 C335 318 318 278 293 253 C309 230 322 202 322 168 C322 118 298 75 256 44 Z"/>
    </clipPath>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Base plinth -->
    <path d="M105 453 C122 425 389 425 407 453 C414 464 406 480 386 484 C330 496 182 496 126 484 C106 480 98 464 105 453 Z" fill="url(#gold)"/>
    <path d="M126 430 C139 404 373 404 386 430 C397 451 370 463 256 463 C142 463 115 451 126 430 Z" fill="url(#whiteMarble)" stroke="url(#gold)" stroke-width="8"/>
    <path d="M151 413 C168 397 344 397 361 413 C371 422 360 433 256 433 C152 433 141 422 151 413 Z" fill="url(#gold)" opacity="0.95"/>
    <path d="M174 391 C188 374 324 374 338 391 C349 405 334 416 256 416 C178 416 163 405 174 391 Z" fill="url(#whiteMarble)" stroke="url(#darkGold)" stroke-width="5"/>

    <!-- Stem and collar -->
    <path d="M207 344 C214 319 298 319 305 344 L328 392 C306 405 206 405 184 392 Z" fill="url(#whiteMarble)" stroke="url(#gold)" stroke-width="7"/>
    <path d="M178 352 C190 332 322 332 334 352 C344 369 324 381 256 381 C188 381 168 369 178 352 Z" fill="url(#gold)"/>
    <path d="M198 329 C207 312 305 312 314 329 C323 345 300 354 256 354 C212 354 189 345 198 329 Z" fill="url(#whiteMarble)" stroke="url(#gold)" stroke-width="5"/>

    <!-- Bishop body -->
    <path d="M256 44 C214 75 190 118 190 168 C190 202 203 230 219 253 C194 278 177 318 177 360 C205 374 307 374 335 360 C335 318 318 278 293 253 C309 230 322 202 322 168 C322 118 298 75 256 44 Z" fill="url(#whiteMarble)" stroke="url(#gold)" stroke-width="9" stroke-linejoin="round"/>

    <!-- Side depth shading -->
    <path d="M285 77 C309 106 320 138 316 178 C312 213 293 238 278 256 C303 284 319 319 319 352 C307 357 292 360 276 361 C286 325 275 286 254 258 C276 230 294 203 296 169 C298 131 293 99 285 77 Z" fill="url(#marbleShadow)" opacity="0.45"/>
    <path d="M221 83 C199 115 194 153 200 186 C205 213 219 238 234 257 C214 284 200 322 199 354 C190 352 184 349 177 345 C180 310 195 278 219 253 C203 230 190 202 190 168 C190 132 201 103 221 83 Z" fill="#ffffff" opacity="0.36"/>

