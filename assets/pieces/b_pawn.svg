      <path d="M427 575c30-54 140-54 170 0" stroke-width="7" opacity="0.9"/>
      <path d="M443 602c20-34 118-34 138 0" stroke-width="4" opacity="0.78"/>
      <path d="M512 506v103" stroke-width="5" opacity="0.9"/>
      <path d="M462 526c8 18 24 31 50 39 26-8 42-21 50-39" stroke-width="4" opacity="0.75"/>
      <path d="M378 716c34 38 77 54 134 54s100-16 134-54" stroke-width="7" opacity="0.95"/>
      <path d="M341 874c72 31 270 31 342 0" stroke-width="7" opacity="0.9"/>
      <path d="M277 900c101 44 369 44 470 0" stroke-width="4" opacity="0.65"/>
    </g>

    <!-- engraved filigree dark grooves -->
    <g fill="none" stroke="#000" stroke-linecap="round" opacity="0.45">
      <path d="M443 533c-18 20-33 43-44 70" stroke-width="5"/>
      <path d="M581 533c18 20 33 43 44 70" stroke-width="5"/>
      <path d="M322 728c88 16 292 16 380 0" stroke-width="5"/>
      <path d="M248 848c127 32 401 32 528 0" stroke-width="5"/>
    </g>

    <!-- gold jewelry dots -->
    <g fill="url(#gold)">
      <circle cx="512" cy="100" r="9"/>
      <circle cx="431" cy="157" r="7"/>
      <circle cx="593" cy="157" r="7"/>
      <circle cx="394" cy="360" r="8"/>
      <circle cx="630" cy="360" r="8"/>
      <circle cx="408" cy="477" r="7"/>
      <circle cx="616" cy="477" r="7"/>
      <circle cx="326" cy="648" r="8"/>
      <circle cx="698" cy="648" r="8"/>
      <circle cx="267" cy="774" r="7"/>
      <circle cx="757" cy="774" r="7"/>
      <circle cx="199" cy="941" r="7"/>
      <circle cx="825" cy="941" r="7"/>
    </g>

    <!-- polished marble highlights -->
    <g fill="#ffffff" opacity="0.12">
      <path d="M454 132c-30 20-49 53-49 90 0 17 4 33 11 47 11-51 39-91 85-121 23-15 8-34-47-16z"/>
      <path d="M334 713c-23 3-42 22-45 46h194c-48-25-98-40-149-46z"/>
      <path d="M191 852c-29 9-50 36-50 69h272c-72-37-147-60-222-69z"/>
    </g>

    <!-- crisp outer gold hairline -->
    <path d="M512 82c-72 0-130 58-130 130 0 42 20 80 52 104-27 19-45 50-45 86 0 22 7 43 19 60-52 39-88 101-100 183h408c-12-82-48-144-100-183 12-17 19-38 19-60 0-36-18-67-45-86 32-24 52-62 52-104 0-72-58-130-130-130zM287 697c-32 0-58 26-58 58v19h566v-19c0-32-26-58-58-58H287zM213 823c-42 0-76 34-76 76v42h750v-42c0-42-34-76-76-76H213z" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linejoin="round"/>
  </g>
</svg>
