<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768" width="512" height="768" role="img" aria-labelledby="title desc">
  <title id="title">Ornate Black Marble Gold Queen Chess Piece</title>
  <desc id="desc">A fully scalable 2D vector SVG of a black marble queen chess piece with gold trim, ornate carvings, and a transparent background.</desc>
  <defs>
    <linearGradient id="blackMarble" x1="85" y1="48" x2="430" y2="715" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d1d21"/>
      <stop offset="0.22" stop-color="#050507"/>
      <stop offset="0.48" stop-color="#2a2a30"/>
      <stop offset="0.72" stop-color="#0c0c10"/>
      <stop offset="1" stop-color="#25252a"/>
    </linearGradient>
    <linearGradient id="marbleHighlight" x1="130" y1="68" x2="330" y2="706" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="0.35" stop-color="#d8d8df" stop-opacity="0.08"/>
      <stop offset="0.75" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="gold" x1="104" y1="62" x2="426" y2="712" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2a8"/>
      <stop offset="0.18" stop-color="#d6a735"/>
      <stop offset="0.39" stop-color="#8f6414"/>
      <stop offset="0.59" stop-color="#ffd86f"/>
      <stop offset="0.82" stop-color="#b88622"/>
      <stop offset="1" stop-color="#fff1a4"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="112" y1="101" x2="397" y2="681" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9c6b13"/>
      <stop offset="0.45" stop-color="#f4cb62"/>
      <stop offset="1" stop-color="#7a500f"/>
    </linearGradient>
    <radialGradient id="gem" cx="50%" cy="38%" r="58%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.25" stop-color="#b80f2f"/>
      <stop offset="0.78" stop-color="#4a0715"/>
      <stop offset="1" stop-color="#1b0208"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="queenClip">
      <path d="M104 694 C111 650 134 624 166 609 C143 553 151 492 184 447 C201 424 203 385 188 360 C171 332 170 304 187 280 C205 254 235 246 256 247 C277 246 307 254 325 280 C342 304 341 332 324 360 C309 385 311 424 328 447 C361 492 369 553 346 609 C378 624 401 650 408 694 Z"/>
    </clipPath>
  </defs>

  <g filter="url(#softShadow)">
    <!-- crown finials -->
    <g stroke="url(#goldDark)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M150 203 L119 106" fill="none"/>
      <path d="M203 191 L186 82" fill="none"/>
      <path d="M256 184 L256 62" fill="none"/>
      <path d="M309 191 L326 82" fill="none"/>
      <path d="M362 203 L393 106" fill="none"/>
    </g>
    <g>
      <circle cx="119" cy="106" r="18" fill="url(#gold)" stroke="#fff0a0" stroke-width="2"/>
      <circle cx="186" cy="82" r="17" fill="url(#gold)" stroke="#fff0a0" stroke-width="2"/>
      <circle cx="256" cy="62" r="20" fill="url(#gold)" stroke="#fff0a0" stroke-width="2"/>
      <circle cx="326" cy="82" r="17" fill="url(#gold)" stroke="#fff0a0" stroke-width="2"/>
      <circle cx="393" cy="106" r="18" fill="url(#gold)" stroke="#fff0a0" stroke-width="2"/>
    </g>

    <!-- crown body -->
    <path d="M121 232 C137 184 157 195 179 223 C192 169 221 168 241 220 C248 178 264 178 271 220 C291 168 320 169 333 223 C355 195 375 184 391 232 C353 260 302 273 256 273 C210 273 159 260 121 232 Z" fill="url(#blackMarble)" stroke="url(#gold)" stroke-width="8" stroke-linejoin="round"/>
    <path d="M139 235 C174 253 215 260 256 260 C297 260 338 253 373 235" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
    <path d="M166 224 C183 235 201 241 220 244 M292 244 C311 241 329 235 346 224" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="4" stroke-linecap="round"/>

    <!-- head orb -->
    <circle cx="256" cy="322" r="63" fill="url(#blackMarble)" stroke="url(#gold)" stroke-width="9"/>
    <circle cx="256" cy="322" r="43" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="10"/>
    <ellipse cx="238" cy="300" rx="21" ry="14" fill="#ffffff" opacity="0.11"/>
    <circle cx="256" cy="322" r="14" fill="url(#gem)" stroke="url(#gold)" stroke-width="4"/>

    <!-- neck rings -->
    <path d="M190 397 C229 415 283 415 322 397 L334 431 C288 454 224 454 178 431 Z" fill="url(#blackMarble)" stroke="url(#gold)" stroke-width="7"/>
    <path d="M178 431 C224 454 288 454 334 431" fill="none" stroke="#fff3b0" stroke-opacity="0.5" stroke-width="3"/>

    <!-- main queen body -->
    <path d="M104 694 C111 650 134 624 166 609 C143 553 151 492 184 447 C201 424 203 385 188 360 C171 332 170 304 187 280 C205 254 235 246 256 247 C277 246 307 254 325 280 C342 304 341 332 324 360 C309 385 311 424 328 447 C361 492 369 553 346 609 C378 624 401 650 408 694 Z" fill="url(#blackMarble)" stroke="url(#gold)" stroke-width="9" stroke-linejoin="round"/>
    <path d="M133 683 C148 650 176 631 206 624 C185 573 188 515 215 466 C228 443 232 410 220 381 C209 354 205 322 222 294 C230 281 242 273 256 270" fill="none" stroke="url(#marbleHighlight)" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
    <path d="M379 682 C364 650 336 631 306 624 C327 573 324 515 297 466 C284 443 280 410 292 381 C303 354 307 322 290 294 C282 281 270 273 256 270" fill="none" stroke="#000" stroke-opacity="0.28" stroke-width="10" stroke-linecap="round"/>

    <!-- gold bands -->
    <path d="M148 504 C190 524 322 524 364 504" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"/>
    <path d="M150 548 C196 570 316 570 362 548" fill="none" stroke="url(#goldDark)" stroke-width="7" stroke-linecap="round"/>
    <path d="M166 609 C211 627 301 627 346 609" fill="none" stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>

    <!-- ornamental carvings clipped to body -->
    <g clip-path="url(#queenClip)" opacity="0.95">
      <path d="M154 672 C219 640 197 578 256 558 C315 578 293 640 358 672" fill="none" stroke="#d9d9e2" stroke-opacity="0.18" stroke-width="4"/>
      <path d="M181 596 C220 584 224 540 256 530 C288 540 292 584 331 596" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.75"/>
      <path d="M212 489 C227 462 244 458 256 482 C268 458 285 462 300 489" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="5" stroke-linecap="round"/>
      <path d="M145 340 C189 374 214 400 218 448" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="5" stroke-linecap="round"/>
      <path d="M367 340 C323 374 298 400 294 448" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="5" stroke-linecap="round"/>
      <path d="M116 640 C164 614 196 573 206 528" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>
      <path d="M396 640 C348 614 316 573 306 528" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>
    </g>

    <!-- base -->
    <path d="M98 691 H414 C433 691 448 710 440 728 C434 742 421 750 404 750 H108 C91 750 78 742 72 728 C64 710 79 691 98 691 Z" fill="url(#blackMarble)" stroke="url(#gold)" stroke-width="9" stroke-linejoin="round"/>
    <path d="M105 710 H407" stroke="url(#goldDark)" stroke-width="7" stroke-linecap="round"/>
    <path d="M129 735 H383" stroke="#ffffff" stroke-opacity="0.13" stroke-width="5" stroke-linecap="round"/>

    <!-- marble veins -->
    <g fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M208 120 C225 150 217 170 238 196 C254 216 249 242 267 261" stroke="#e8e8ee" stroke-opacity="0.16" stroke-width="2"/>
      <path d="M305 105 C281 144 310 174 286 209" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.8"/>
      <path d="M197 294 C224 315 210 348 232 371" stroke="#d0d0d8" stroke-opacity="0.13" stroke-width="2.5"/>
      <path d="M311 294 C291 329 324 359 295 396" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
      <path d="M184 465 C225 486 194 534 236 558 C263 573 248 606 279 628" stroke="#ececf2" stroke-opacity="0.15" stroke-width="2.2"/>
      <path d="M335 476 C305 504 332 544 298 574 C279 591 294 618 264 648" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
      <path d="M127 704 C175 717 232 707 284 724 C321 736 359 729 405 737" stroke="#f5f5fa" stroke-opacity="0.13" stroke-width="2.3"/>
      <path d="M142 659 C165 642 175 617 198 603" stroke="#bfc0ca" stroke-opacity="0.13" stroke-width="1.8"/>
    </g>

    <!-- central gold filigree -->
    <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
      <path d="M256 454 C236 477 236 503 256 522 C276 503 276 477 256 454 Z" stroke-width="4"/>
      <path d="M256 522 C234 548 235 578 256 598 C277 578 278 548 256 522 Z" stroke-width="3"/>
      <path d="M225 536 C205 533 193 518 197 500 C214 504 226 515 225 536 Z" stroke-width="3"/>
      <path d="M287 536 C307 533 319 518 315 500 C298 504 286 515 287 536 Z" stroke-width="3"/>
    </g>
  </g>
</svg>
