      <path d="M215 769 C302 739 361 789 438 755 C525 717 591 730 724 702" fill="none" stroke="#919797" stroke-width="5" stroke-linecap="round" opacity="0.28"/>
      <path d="M222 888 C322 856 377 915 482 882 C577 852 649 858 809 879" fill="none" stroke="#777d7d" stroke-width="4" stroke-linecap="round" opacity="0.30"/>
      <path d="M457 137 C433 240 480 318 451 410 C420 509 445 619 389 738" fill="none" stroke="#b2b7b6" stroke-width="3" opacity="0.28"/>
      <path d="M597 132 C576 231 627 300 603 405 C580 506 626 617 599 732" fill="none" stroke="#747a7a" stroke-width="3" opacity="0.22"/>
      <path d="M519 210 C540 258 512 297 535 343 C555 385 546 436 571 482" fill="none" stroke="#6f7777" stroke-width="2" opacity="0.25"/>
