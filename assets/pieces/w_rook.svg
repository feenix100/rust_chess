<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Ornate White Marble and Gold Rook Chess Piece</title>
  <desc id="desc">A luxury 2D vector SVG rook chess piece carved from white polished marble with gray veining, metallic gold trim, crenellated castle top, ornamental engravings, and transparent background.</desc>
  <defs>
    <linearGradient id="marbleWhite" x1="210" y1="80" x2="820" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.16" stop-color="#f5f5f2"/>
      <stop offset="0.36" stop-color="#dcdedc"/>
      <stop offset="0.54" stop-color="#ffffff"/>
      <stop offset="0.76" stop-color="#c9cccb"/>
      <stop offset="1" stop-color="#f7f6f1"/>
    </linearGradient>

    <linearGradient id="marbleShadow" x1="218" y1="170" x2="750" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset="0.45" stop-color="#babfbe"/>
      <stop offset="1" stop-color="#eef0ef"/>
    </linearGradient>

    <linearGradient id="gold" x1="190" y1="70" x2="835" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2a6"/>
      <stop offset="0.18" stop-color="#d6a631"/>
      <stop offset="0.38" stop-color="#fff6bd"/>
      <stop offset="0.58" stop-color="#b77a12"/>
      <stop offset="0.78" stop-color="#f7d56a"/>
      <stop offset="1" stop-color="#8b5a0a"/>
    </linearGradient>

    <linearGradient id="goldDark" x1="240" y1="120" x2="760" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d89f22"/>
      <stop offset="0.5" stop-color="#7d4b05"/>
      <stop offset="1" stop-color="#e7bd49"/>
    </linearGradient>

    <linearGradient id="highlight" x1="342" y1="110" x2="468" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.22"/>
    </filter>

    <clipPath id="rookClip">
      <path d="M330 138 H418 V207 H463 V138 H562 V207 H607 V138 H694 V320 C694 346 672 365 648 365 H632 V458 C632 497 608 526 584 544 C604 592 623 660 632 731 H705 C730 731 750 751 750 776 V834 H790 C815 834 838 858 838 886 V924 H186 V886 C186 858 209 834 234 834 H274 V776 C274 751 294 731 319 731 H392 C401 660 420 592 440 544 C416 526 392 497 392 458 V365 H376 C352 365 330 346 330 320 Z"/>
    </clipPath>
  </defs>

