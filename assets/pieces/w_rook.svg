    <path d="M476 168 H538 C529 219 526 267 532 318 H481 C487 268 485 219 476 168 Z" fill="#ffffff" opacity="0.20"/>
    <path d="M435 586 C471 603 553 603 589 586" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.30"/>
